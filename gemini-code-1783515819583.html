<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 명소 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 별점 버튼 기본 스타일 (50% 투명도 회색) */
        .btn-star-default {
            background-color: rgba(128, 128, 128, 0.5);
            color: white;
        }
        /* 즐겨찾기 활성화 상태 (노란색 배경) */
        .btn-star-active {
            background-color: #facc15;
            color: #1e293b;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-6">

    <div class="max-w-7xl mx-auto space-y-8">
        
        <header class="text-center py-6 bg-white rounded-2xl shadow-sm border border-slate-100">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">📌 나만의 명소 대시보드</h1>
            <p class="text-slate-500 mt-2 font-medium">가고 싶은 장소를 카테고리별로 저장하고 네이버 지도로 바로 확인하세요!</p>
        </header>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
            <div class="flex flex-col md:flex-row gap-3">
                <div class="flex-1 flex gap-2">
                    <input type="text" id="spotInput" placeholder="명소 이름을 입력하세요 (예: 성산일출봉)" 
                           class="flex-grow px-4 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                    <button onclick="addSpot()" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition shadow-sm">
                        추가하기
                    </button>
                </div>
                <button onclick="resetAllSpots()" class="px-5 py-2.5 bg-red-50 hover:bg-red-100 text-red-600 font-semibold rounded-xl transition border border-red-200">
                    <i class="fa-solid fa-trash-can mr-1"></i> 전체 초기화
                </button>
            </div>

            <hr class="border-slate-100">

            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pt-2">
                <div class="flex flex-wrap items-center gap-2">
                    <span class="text-sm font-bold text-slate-500 mr-2"><i class="fa-solid fa-filter mr-1"></i> 카테고리 필터:</span>
                    
                    <label class="inline-flex items-center space-x-1.5 bg-slate-200 text-slate-800 px-3 py-1.5 rounded-lg text-sm font-bold cursor-pointer transition hover:bg-slate-300">
                        <input type="checkbox" id="selectAllFilter" checked onchange="toggleSelectAll(this)" class="rounded text-slate-700 focus:ring-slate-500">
                        <span>전체</span>
                    </label>

                    <label class="inline-flex items-center space-x-1.5 bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-medium cursor-pointer">
                        <input type="checkbox" value="없음" checked onchange="filterSpots()" class="filter-category rounded text-blue-600 focus:ring-blue-500">
                        <span>없음</span>
                    </label>
                    <label class="inline-flex items-center space-x-1.5 bg-red-50 text-red-700 px-3 py-1.5 rounded-lg text-sm font-medium cursor-pointer">
                        <input type="checkbox" value="맛집" checked onchange="filterSpots()" class="filter-category rounded text-red-600 focus:ring-red-500">
                        <span>맛집</span>
                    </label>
                    <label class="inline-flex items-center space-x-1.5 bg-amber-50 text-amber-700 px-3 py-1.5 rounded-lg text-sm font-medium cursor-pointer">
                        <input type="checkbox" value="카페" checked onchange="filterSpots()" class="filter-category rounded text-amber-600 focus:ring-amber-500">
                        <span>카페</span>
                    </label>
                    <label class="inline-flex items-center space-x-1.5 bg-green-50 text-green-700 px-3 py-1.5 rounded-lg text-sm font-medium cursor-pointer">
                        <input type="checkbox" value="놀거리" checked onchange="filterSpots()" class="filter-category rounded text-green-600 focus:ring-green-500">
                        <span>놀거리</span>
                    </label>
                    <label class="inline-flex items-center space-x-1.5 bg-purple-50 text-purple-700 px-3 py-1.5 rounded-lg text-sm font-medium cursor-pointer">
                        <input type="checkbox" value="쇼핑" checked onchange="filterSpots()" class="filter-category rounded text-purple-600 focus:ring-purple-500">
                        <span>쇼핑</span>
                    </label>
                    <label class="inline-flex items-center space-x-1.5 bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg text-sm font-medium cursor-pointer">
                        <input type="checkbox" value="기타" checked onchange="filterSpots()" class="filter-category rounded text-indigo-600 focus:ring-indigo-500">
                        <span>기타</span>
                    </label>
                </div>

                <div class="flex items-center gap-2">
                    <span class="text-sm font-bold text-slate-500"><i class="fa-solid fa-sort mr-1"></i> 정렬:</span>
                    <select id="sortSelect" onchange="render()" class="text-sm border border-slate-300 rounded-lg p-1.5 bg-white font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="latest">최신 등록순</option>
                        <option value="oldest">과거 등록순</option>
                        <option value="abc">가나다순</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="bg-amber-50/60 p-6 rounded-2xl border border-amber-200/70 shadow-sm">
            <h2 class="text-lg font-bold text-amber-800 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-star text-amber-400"></i> 즐겨찾기한 명소 목록
                <span id="favCount" class="text-sm bg-amber-200 text-amber-900 px-2 py-0.5 rounded-full font-semibold">0</span>
            </h2>
            <div id="favoriteSpotsList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                </div>
        </section>

        <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-list-ul text-blue-500"></i> 추가한 명소 목록 
                <span id="totalCount" class="text-sm bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full font-semibold">0 / 200</span>
            </h2>
            <div id="addedSpotsList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                </div>
        </section>

    </div>

    <script>
        let spots = JSON.parse(localStorage.getItem('mySpots')) || [];

        document.getElementById('spotInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addSpot();
        });

        function addSpot() {
            const input = document.getElementById('spotInput');
            const spotName = input.value.trim();

            if (!spotName) {
                alert('명소 이름을 입력해 주세요.');
                return;
            }

            if (spots.length >= 200) {
                alert('명소는 최대 200개까지만 등록 가능합니다.');
                return;
            }

            const newSpot = {
                id: Date.now() + Math.random().toString(36).substr(2, 5),
                name: spotName,
                url: `https://map.naver.com/p/search/${encodeURIComponent(spotName)}`,
                isFavorite: false,
                category: '없음',
                createdAt: new Date().getTime()
            };

            spots.push(newSpot);
            saveToStorage();
            input.value = '';
            render();
        }

        function deleteSpot(id) {
            spots = spots.filter(spot => spot.id !== id);
            saveToStorage();
            render();
        }

        function toggleFavorite(id) {
            const spot = spots.find(s => s.id === id);
            if (spot) {
                spot.isFavorite = !spot.isFavorite;
                saveToStorage();
                render();
            }
        }

        function changeCategory(id, newCategory) {
            const spot = spots.find(s => s.id === id);
            if (spot) {
                spot.category = newCategory;
                saveToStorage();
                render(); 
            }
        }

        function resetAllSpots() {
            if (confirm('정말로 모든 명소 목록을 삭제하시겠습니까?')) {
                spots = [];
                saveToStorage();
                render();
            }
        }

        // [추가] 전체 선택 토글 함수
        function toggleSelectAll(masterCheckbox) {
            const checkboxes = document.querySelectorAll('.filter-category');
            checkboxes.forEach(cb => {
                cb.checked = masterCheckbox.checked;
            });
            render();
        }

        // 현재 선택된 다중 카테고리 필터 가져오기
        function getSelectedCategories() {
            const checkboxes = document.querySelectorAll('.filter-category:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // [수정] 필터 체크박스 변경 시 호출 (전체 선택 버튼 상태 연동)
        function filterSpots() {
            const masterCheckbox = document.getElementById('selectAllFilter');
            const checkboxes = document.querySelectorAll('.filter-category');
            
            // 모든 카테고리가 체크되어 있는지 확인
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            masterCheckbox.checked = allChecked;

            render();
        }

        function sortSpots(spotsArray) {
            const sortValue = document.getElementById('sortSelect').value;
            if (sortValue === 'latest') {
                return spotsArray.sort((a, b) => b.createdAt - a.createdAt);
            } else if (sortValue === 'oldest') {
                return spotsArray.sort((a, b) => a.createdAt - b.createdAt);
            } else if (sortValue === 'abc') {
                return spotsArray.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
            }
            return spotsArray;
        }

        function saveToStorage() {
            localStorage.setItem('mySpots', JSON.stringify(spots));
        }

        function render() {
            const favListContainer = document.getElementById('favoriteSpotsList');
            const addedListContainer = document.getElementById('addedSpotsList');
            
            favListContainer.innerHTML = '';
            addedListContainer.innerHTML = '';

            const selectedCategories = getSelectedCategories();

            let sortedSpots = [...spots];
            sortedSpots = sortSpots(sortedSpots);

            let favCount = 0;

            sortedSpots.forEach(spot => {
                const isVisible = selectedCategories.includes(spot.category);

                const cardHTML = `
                    <div class="relative bg-white border border-slate-200 rounded-xl p-4 pt-10 pb-12 shadow-sm flex flex-col justify-between min-h-[130px] transition-all hover:shadow-md hover:border-slate-300 ${!isVisible ? 'opacity-25' : ''}">
                        <button onclick="deleteSpot('${spot.id}')" class="absolute top-2 left-2 text-slate-400 hover:text-red-500 transition text-sm px-1.5 py-0.5 rounded-md hover:bg-slate-100" title="삭제">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                        
                        <button onclick="toggleFavorite('${spot.id}')" 
                                class="absolute top-2 right-2 w-7 h-7 flex items-center justify-center rounded-full text-xs transition shadow-sm ${spot.isFavorite ? 'btn-star-active' : 'btn-star-default'}" 
                                title="${spot.isFavorite ? '즐겨찾기 해제' : '즐겨찾기 등록'}">
                            <i class="fa-solid fa-star"></i>
                        </button>

                        <div class="my-auto text-center">
                            <a href="${spot.url}" target="_blank" class="inline-block text-blue-600 hover:text-blue-800 font-bold text-base hover:underline break-all" title="네이버 지도로 열기">
                                <i class="fa-solid fa-location-dot text-slate-400 mr-1"></i>${spot.name}
                            </a>
                        </div>

                        <div class="absolute bottom-2 right-2">
                            <select onchange="changeCategory('${spot.id}', this.value)" class="text-xs border border-slate-300 rounded bg-slate-50 px-1 py-0.5 font-medium text-slate-600 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                <option value="없음" ${spot.category === '없음' ? 'selected' : ''}>없음</option>
                                <option value="맛집" ${spot.category === '맛집' ? 'selected' : ''}>맛집</option>
                                <option value="카페" ${spot.category === '카페' ? 'selected' : ''}>카페</option>
                                <option value="놀거리" ${spot.category === '놀거리' ? 'selected' : ''}>놀거리</option>
                                <option value="쇼핑" ${spot.category === '쇼핑' ? 'selected' : ''}>쇼핑</option>
                                <option value="기타" ${spot.category === '기타' ? 'selected' : ''}>기타</option>
                            </select>
                        </div>
                    </div>
                `;

                if (spot.isFavorite) {
                    favListContainer.insertAdjacentHTML('beforeend', cardHTML);
                    favCount++;
                } else {
                    addedListContainer.insertAdjacentHTML('beforeend', cardHTML);
                }
            });

            document.getElementById('favCount').innerText = favCount;
            document.getElementById('totalCount').innerText = `${spots.length} / 200`;

            if (favListContainer.children.length === 0) {
                favListContainer.innerHTML = `<p class="col-span-full text-center py-6 text-sm font-medium text-amber-600/70">즐겨찾기한 명소가 없습니다. 별 버튼을 눌러 등록해 보세요!</p>`;
            }
            if (addedListContainer.children.length === 0) {
                addedListContainer.innerHTML = `<p class="col-span-full text-center py-10 text-sm font-medium text-slate-400">등록된 명소가 없습니다. 새로운 장소를 추가해 보세요.</p>`;
            }
        }

        render();
    </script>
</body>
</html>
